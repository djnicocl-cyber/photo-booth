<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Photo Booth</title>
<script src="config.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
        width:100%; height:100%;
            background:#0a0a0f;
                font-family: 'Arial Black', Arial, sans-serif;
                    overflow:hidden;
                        color:#fff;
                            touch-action: manipulation;
                              }
                              
                                /* ===== SCREENS ===== */
                                  .screen {
                                      position:fixed; inset:0;
                                          display:flex; flex-direction:column;
                                              align-items:center; justify-content:center;
                                                  transition: opacity 0.4s ease;
                                                    }
                                                      .screen.hidden { opacity:0; pointer-events:none; }
                                                      
                                                        /* ===== SCREEN 1: WELCOME ===== */
                                                          #screen-welcome { background:#0a0a0f; }
                                                            #welcome-logo { max-width:320px; max-height:180px; object-fit:contain; margin-bottom:24px; display:none; }
                                                              #welcome-title {
                                                                  font-size:clamp(2.5rem, 8vw, 5rem);
                                                                      font-weight:900;
                                                                          text-align:center;
                                                                              line-height:1.1;
                                                                                  margin-bottom:12px;
                                                                                    }
                                                                                      #welcome-subtitle {
                                                                                          font-size:clamp(1rem, 3vw, 1.5rem);
                                                                                              color:#aaa;
                                                                                                  margin-bottom:48px;
                                                                                                      text-align:center;
                                                                                                        }
                                                                                                          #btn-start {
                                                                                                              background: linear-gradient(135deg, #ff2d8b, #ff6b35);
                                                                                                                  border:none; border-radius:60px;
                                                                                                                      padding: 28px 64px;
                                                                                                                          font-size: clamp(1.5rem, 5vw, 2.5rem);
                                                                                                                              font-weight:900;
                                                                                                                                  color:#fff;
                                                                                                                                      cursor:pointer;
                                                                                                                                          box-shadow: 0 0 40px rgba(255,45,139,0.6);
                                                                                                                                              animation: pulse 2s infinite;
                                                                                                                                                  letter-spacing:2px;
                                                                                                                                                      user-select:none;
                                                                                                                                                        }
                                                                                                                                                          @keyframes pulse {
                                                                                                                                                              0%,100% { transform:scale(1); box-shadow:0 0 40px rgba(255,45,139,0.6); }
                                                                                                                                                                  50%      { transform:scale(1.05); box-shadow:0 0 70px rgba(255,45,139,0.9); }
                                                                                                                                                                    }
                                                                                                                                                                    
                                                                                                                                                                      /* ===== SCREEN 2: CAMERA ===== */
                                                                                                                                                                        #screen-camera { background:#000; flex-direction:column; padding:0; }
                                                                                                                                                                          #video-container {
                                                                                                                                                                              position:relative;
                                                                                                                                                                                  width:100%; flex:1;
                                                                                                                                                                                      display:flex; align-items:center; justify-content:center;
                                                                                                                                                                                          overflow:hidden;
                                                                                                                                                                                            }
                                                                                                                                                                                              #video {
                                                                                                                                                                                                  width:100%; height:100%;
                                                                                                                                                                                                      object-fit:cover;
                                                                                                                                                                                                          transform: scaleX(-1);
                                                                                                                                                                                                            }
                                                                                                                                                                                                            
                                                                                                                                                                                                              /* Overlay cuenta regresiva GRANDE */
                                                                                                                                                                                                                #countdown-overlay {
                                                                                                                                                                                                                    position:absolute; inset:0;
                                                                                                                                                                                                                        display:flex; flex-direction:column;
                                                                                                                                                                                                                            align-items:center; justify-content:center;
                                                                                                                                                                                                                                background:rgba(0,0,0,0.35);
                                                                                                                                                                                                                                    pointer-events:none;
                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                        #countdown-overlay.hidden { display:none; }
                                                                                                                                                                                                                                          #countdown-label {
                                                                                                                                                                                                                                              font-size:clamp(1rem, 3vw, 1.4rem);
                                                                                                                                                                                                                                                  color:#fff;
                                                                                                                                                                                                                                                      font-weight:700;
                                                                                                                                                                                                                                                          letter-spacing:3px;
                                                                                                                                                                                                                                                              text-transform:uppercase;
                                                                                                                                                                                                                                                                  margin-bottom:8px;
                                                                                                                                                                                                                                                                      text-shadow:0 2px 8px #000;
                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                          #countdown-number {
                                                                                                                                                                                                                                                                              font-size:clamp(8rem, 30vw, 18rem);
                                                                                                                                                                                                                                                                                  font-weight:900;
                                                                                                                                                                                                                                                                                      color:#ff2d8b;
                                                                                                                                                                                                                                                                                          line-height:1;
                                                                                                                                                                                                                                                                                              text-shadow: 0 0 60px rgba(255,45,139,0.8), 0 4px 20px #000;
                                                                                                                                                                                                                                                                                                  animation: countdown-pop 0.5s ease-out;
                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                      @keyframes countdown-pop {
                                                                                                                                                                                                                                                                                                          0%   { transform:scale(1.5); opacity:0; }
                                                                                                                                                                                                                                                                                                              100% { transform:scale(1);   opacity:1; }
                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                  /* Flash al tomar foto */
                                                                                                                                                                                                                                                                                                                    #flash {
                                                                                                                                                                                                                                                                                                                        position:absolute; inset:0;
                                                                                                                                                                                                                                                                                                                            background:#fff;
                                                                                                                                                                                                                                                                                                                                opacity:0;
                                                                                                                                                                                                                                                                                                                                    pointer-events:none;
                                                                                                                                                                                                                                                                                                                                        transition: opacity 0.05s ease;
                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                            #flash.active { opacity:1; }
                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                              /* Tiras de miniaturas laterales */
                                                                                                                                                                                                                                                                                                                                                #strip-preview {
                                                                                                                                                                                                                                                                                                                                                    position:absolute; right:12px; top:50%;
                                                                                                                                                                                                                                                                                                                                                        transform:translateY(-50%);
                                                                                                                                                                                                                                                                                                                                                            display:flex; flex-direction:column;
                                                                                                                                                                                                                                                                                                                                                                gap:8px;
                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                    .thumb-slot {
                                                                                                                                                                                                                                                                                                                                                                        width:clamp(60px,10vw,90px);
                                                                                                                                                                                                                                                                                                                                                                            height:clamp(80px,13vw,120px);
                                                                                                                                                                                                                                                                                                                                                                                border-radius:8px;
                                                                                                                                                                                                                                                                                                                                                                                    border:3px solid rgba(255,255,255,0.2);
                                                                                                                                                                                                                                                                                                                                                                                        background:rgba(255,255,255,0.05);
                                                                                                                                                                                                                                                                                                                                                                                            overflow:hidden;
                                                                                                                                                                                                                                                                                                                                                                                                position:relative;
                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                    .thumb-slot img {
                                                                                                                                                                                                                                                                                                                                                                                                        width:100%; height:100%;
                                                                                                                                                                                                                                                                                                                                                                                                            object-fit:cover;
                                                                                                                                                                                                                                                                                                                                                                                                                transform:scaleX(-1);
                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                    .thumb-slot .thumb-num {
                                                                                                                                                                                                                                                                                                                                                                                                                        position:absolute; inset:0;
                                                                                                                                                                                                                                                                                                                                                                                                                            display:flex; align-items:center; justify-content:center;
                                                                                                                                                                                                                                                                                                                                                                                                                                font-size:1.5rem; color:rgba(255,255,255,0.3);
                                                                                                                                                                                                                                                                                                                                                                                                                                    font-weight:900;
                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                        .thumb-slot.taken { border-color:#ff2d8b; }
                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                          /* Barra inferior info */
                                                                                                                                                                                                                                                                                                                                                                                                                                            #camera-info {
                                                                                                                                                                                                                                                                                                                                                                                                                                                width:100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                    padding:12px 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        background:rgba(0,0,0,0.8);
                                                                                                                                                                                                                                                                                                                                                                                                                                                            display:flex; align-items:center; justify-content:center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                gap:16px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    min-height:60px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        #photo-counter {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-size:clamp(1rem, 3vw, 1.4rem);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-weight:900;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    color:#ff2d8b;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        letter-spacing:2px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            #camera-status {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-size:clamp(0.8rem, 2vw, 1rem);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    color:#ccc;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        text-align:center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* ===== SCREEN 3: PROCESSING ===== */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              #screen-processing {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  background:radial-gradient(ellipse at center, #1a0030 0%, #0a0a0f 70%);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      gap:24px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .spinner {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              width:80px; height:80px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  border:6px solid rgba(255,45,139,0.2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      border-top-color:#ff2d8b;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          border-radius:50%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              animation:spin 1s linear infinite;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  @keyframes spin { to { transform:rotate(360deg); } }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    #processing-text {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-size:clamp(1.2rem, 4vw, 2rem);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-weight:700;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                color:#ff2d8b;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    letter-spacing:3px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        text-transform:uppercase;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* ===== SCREEN 4: RESULT ===== */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              #screen-result {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  background:radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0f 70%);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      gap:20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          padding:20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              flex-direction:row;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  align-items:center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      justify-content:center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          #result-strip-container {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              display:flex; flex-direction:column;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  align-items:center; gap:12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      flex-shrink:0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          #result-canvas {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              max-height:75vh;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  max-width:40vw;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      object-fit:contain;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          border-radius:12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              box-shadow: 0 0 40px rgba(255,45,139,0.4);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  #result-actions {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      display:flex; flex-direction:column;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          align-items:center; gap:16px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              max-width:300px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  #result-title {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      font-size:clamp(1.5rem, 4vw, 2.5rem);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          font-weight:900;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              text-align:center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  line-height:1.2;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      #result-subtitle {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          font-size:clamp(0.9rem, 2vw, 1.2rem);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              color:#aaa;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  text-align:center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      #btn-print {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          background: linear-gradient(135deg, #ff2d8b, #ff6b35);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              border:none; border-radius:50px;
