<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Photo Booth</title>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#0d0d1a;color:#fff;}

/* ===== PANTALLAS ===== */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease;}
.screen.hidden{opacity:0;pointer-events:none;}

/* ===== WELCOME ===== */
#screenWelcome{background:var(--bg);}
.welcome-logo{max-width:320px;max-height:160px;object-fit:contain;margin-bottom:32px;filter:drop-shadow(0 4px 24px rgba(0,0,0,0.6));}
.welcome-logo-placeholder{font-size:64px;margin-bottom:24px;}
.welcome-title{font-size:clamp(2rem,8vw,5rem);font-weight:900;letter-spacing:-1px;text-align:center;line-height:1.1;margin-bottom:12px;}
.welcome-subtitle{font-size:clamp(1rem,3vw,1.5rem);opacity:0.7;text-align:center;margin-bottom:48px;padding:0 24px;}
.btn-shoot{
  background:var(--accent);color:#fff;
    border:none;border-radius:999px;
      padding:clamp(18px,4vw,28px) clamp(48px,10vw,80px);
        font-size:clamp(1.2rem,4vw,2rem);
          font-weight:900;letter-spacing:1px;
            cursor:pointer;
              box-shadow:0 0 0 0 var(--accent);
                animation:pulse-btn 2s ease-in-out infinite;
                  text-transform:uppercase;
                    transition:transform 0.1s;
                      user-select:none;
                        -webkit-user-select:none;
                        }
                        .btn-shoot:active{transform:scale(0.95);}
                        @keyframes pulse-btn{
                          0%,100%{box-shadow:0 0 0 0 rgba(255,102,204,0.5);}
                            50%{box-shadow:0 0 0 24px rgba(255,102,204,0);}
                            }

                            /* ===== CAMARA ===== */
                            #screenCamera{background:#000;}
                            #cameraVideo{
                              width:100%;height:100%;
                                object-fit:cover;
                                  position:absolute;inset:0;
                                  }
                                  #cameraVideoMirror{transform:scaleX(-1);}

                                  /* Overlay cuenta regresiva sobre camara */
                                  #countdownOverlay{
                                    position:absolute;inset:0;
                                      display:flex;flex-direction:column;
                                        align-items:center;justify-content:center;
                                          background:rgba(0,0,0,0.35);
                                            z-index:10;
                                            }
                                            #countdownNumber{
                                              font-size:clamp(120px,30vw,260px);
                                                font-weight:900;
                                                  color:#fff;
                                                    line-height:1;
                                                      text-shadow:0 0 80px rgba(255,102,204,0.8);
                                                        animation:cd-pop 0.7s cubic-bezier(0.16,1,0.3,1);
                                                        }
                                                        @keyframes cd-pop{0%{transform:scale(2.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
                                                        #countdownLabel{
                                                          font-size:clamp(16px,4vw,28px);
                                                            font-weight:700;letter-spacing:4px;
                                                              color:rgba(255,255,255,0.7);
                                                                text-transform:uppercase;
                                                                  margin-top:12px;
                                                                  }

                                                                  /* Miniaturas de fotos tomadas */
                                                                  #photoThumbs{
                                                                    position:absolute;bottom:24px;left:0;right:0;
                                                                      display:flex;justify-content:center;gap:12px;
                                                                        z-index:10;padding:0 16px;
                                                                        }
                                                                        .thumb-slot{
                                                                          width:clamp(60px,12vw,100px);
                                                                            aspect-ratio:4/3;
                                                                              border-radius:8px;
                                                                                border:3px solid rgba(255,255,255,0.2);
                                                                                  background:rgba(255,255,255,0.05);
                                                                                    overflow:hidden;
                                                                                      transition:border-color 0.3s;
                                                                                      }
                                                                                      .thumb-slot.taken{border-color:var(--accent);}
                                                                                      .thumb-slot img{width:100%;height:100%;object-fit:cover;}

                                                                                      /* Indicador foto numero */
                                                                                      #photoIndicator{
                                                                                        position:absolute;top:24px;left:0;right:0;
                                                                                          text-align:center;z-index:10;
                                                                                            font-size:clamp(14px,3vw,22px);
                                                                                              font-weight:700;letter-spacing:2px;
                                                                                                color:rgba(255,255,255,0.8);
                                                                                                  text-shadow:0 2px 8px rgba(0,0,0,0.8);
                                                                                                    text-transform:uppercase;
                                                                                                    }

                                                                                                    /* FLASH */
                                                                                                    #flashOverlay{
                                                                                                      position:absolute;inset:0;
                                                                                                        background:var(--flash);
                                                                                                          opacity:0;z-index:20;
                                                                                                            pointer-events:none;
                                                                                                              transition:opacity 0.05s;
                                                                                                              }
                                                                                                              #flashOverlay.flash-on{opacity:1;}

                                                                                                              /* ===== PROCESANDO ===== */
                                                                                                              #screenProcessing{background:#0d0d1a;}
                                                                                                              #processingText{font-size:clamp(1.2rem,4vw,2rem);font-weight:700;opacity:0.7;letter-spacing:2px;}
                                                                                                              .spinner{width:64px;height:64px;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:24px;}
                                                                                                              @keyframes spin{to{transform:rotate(360deg);}}

                                                                                                              /* ===== RESULTADO ===== */
                                                                                                              #screenResult{background:#0a0a14;gap:24px;padding:24px;}
                                                                                                              #resultStrip{
                                                                                                                max-height:75vh;
                                                                                                                  max-width:360px;
                                                                                                                    width:100%;
                                                                                                                      border-radius:12px;
                                                                                                                        box-shadow:0 8px 48px rgba(0,0,0,0.8);
                                                                                                                          object-fit:contain;
                                                                                                                          }
                                                                                                                          .result-buttons{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
                                                                                                                          .btn-print{
                                                                                                                            background:var(--accent);color:#fff;border:none;
                                                                                                                              border-radius:999px;padding:16px 48px;
                                                                                                                                font-size:1.2rem;font-weight:800;cursor:pointer;
                                                                                                                                  letter-spacing:1px;text-transform:uppercase;
                                                                                                                                    box-shadow:0 4px 24px rgba(255,102,204,0.4);
                                                                                                                                      transition:transform 0.1s,box-shadow 0.2s;
                                                                                                                                      }
                                                                                                                                      .btn-print:active{transform:scale(0.96);}
                                                                                                                                      .btn-repeat{
                                                                                                                                        background:transparent;color:rgba(255,255,255,0.6);
                                                                                                                                          border:2px solid rgba(255,255,255,0.2);
                                                                                                                                            border-radius:999px;padding:14px 36px;
                                                                                                                                              font-size:1rem;font-weight:600;cursor:pointer;
                                                                                                                                                letter-spacing:1px;transition:border-color 0.2s,color 0.2s;
                                                                                                                                                }
                                                                                                                                                .btn-repeat:hover{border-color:rgba(255,255,255,0.5);color:#fff;}
                                                                                                                                                .result-countdown{font-size:0.85rem;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-top:4px;}
                                                                                                                                                </style>
                                                                                                                                                </head>
                                                                                                                                                <body>

                                                                                                                                                <!-- FLASH -->
                                                                                                                                                <div id="flashOverlay"></div>

                                                                                                                                                <!-- PANTALLA 1: BIENVENIDA -->
                                                                                                                                                <div id="screenWelcome" class="screen">
                                                                                                                                                  <div id="welcomeLogoWrap"></div>
                                                                                                                                                    <div id="welcomeTitle" class="welcome-title"></div>
                                                                                                                                                      <div id="welcomeSubtitle" class="welcome-subtitle"></div>
                                                                                                                                                        <button class="btn-shoot" id="btnShoot" onclick="startSession()">
                                                                                                                                                            &#128247; &iexcl;TOMAR FOTOS!
                                                                                                                                                              </button>
                                                                                                                                                              </div>

                                                                                                                                                              <!-- PANTALLA 2: CAMARA + CUENTA REGRESIVA -->
                                                                                                                                                              <div id="screenCamera" class="screen hidden">
                                                                                                                                                                <video id="cameraVideo" autoplay muted playsinline></video>
                                                                                                                                                                  <div id="photoIndicator"></div>
                                                                                                                                                                    <div id="countdownOverlay" style="display:none;">
                                                                                                                                                                        <div id="countdownNumber">3</div>
                                                                                                                                                                            <div id="countdownLabel">Prep&aacute;rate...</div>
                                                                                                                                                                              </div>
                                                                                                                                                                                <div id="photoThumbs"></div>
                                                                                                                                                                                </div>

                                                                                                                                                                                <!-- PANTALLA 3: PROCESANDO -->
                                                                                                                                                                                <div id="screenProcessing" class="screen hidden">
                                                                                                                                                                                  <div class="spinner"></div>
                                                                                                                                                                                    <div id="processingText">Generando tu tira...</div>
                                                                                                                                                                                    </div>

                                                                                                                                                                                    <!-- PANTALLA 4: RESULTADO -->
                                                                                                                                                                                    <div id="screenResult" class="screen hidden">
                                                                                                                                                                                      <img id="resultStrip" src="" alt="Tu tira de fotos"/>
                                                                                                                                                                                        <div class="result-buttons">
                                                                                                                                                                                            <button class="btn-print" id="btnPrint" onclick="printStrip()">
                                                                                                                                                                                                  &#128424; Imprimir
                                                                                                                                                                                                      </button>
                                                                                                                                                                                                          <button class="btn-repeat" onclick="resetBooth()">
                                                                                                                                                                                                                &#8635; Nueva sesi&oacute;n
                                                                                                                                                                                                                    </button>
                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                        <div class="result-countdown" id="resultCountdown"></div>
                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                        <!-- Canvas oculto para composicion -->
                                                                                                                                                                                                                        <canvas id="compositionCanvas" style="display:none;"></canvas>

                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                        // ============================================================
                                                                                                                                                                                                                        //  PHOTO BOOTH — LOGICA PRINCIPAL
                                                                                                                                                                                                                        // ============================================================

                                                                                                                                                                                                                        const C = BOOTH_CONFIG;

                                                                                                                                                                                                                        // Aplicar CSS variables desde config
                                                                                                                                                                                                                        document.documentElement.style.setProperty('--accent', C.welcomeAccent);
                                                                                                                                                                                                                        document.documentElement.style.setProperty('--bg', C.welcomeBgColor);
                                                                                                                                                                                                                        document.documentElement.style.setProperty('--flash', C.flashColor);
                                                                                                                                                                                                                        document.getElementById('screenWelcome').style.background = C.welcomeBgColor;

                                                                                                                                                                                                                        // Estado
                                                                                                                                                                                                                        let photos = [];
                                                                                                                                                                                                                        let stream = null;
                                                                                                                                                                                                                        let returnTimer = null;

                                                                                                                                                                                                                        // ===== INIT =====
                                                                                                                                                                                                                        window.addEventListener('DOMContentLoaded', () => {
                                                                                                                                                                                                                          // Titulo y subtitulo
                                                                                                                                                                                                                            document.getElementById('welcomeTitle').textContent = C.welcomeTitle;
                                                                                                                                                                                                                              document.getElementById('welcomeSubtitle').textContent = C.welcomeSubtitle;

                                                                                                                                                                                                                                // Logo en bienvenida
                                                                                                                                                                                                                                  const logoWrap = document.getElementById('welcomeLogoWrap');
                                                                                                                                                                                                                                    if (C.logoImage) {
                                                                                                                                                                                                                                        const img = document.createElement('img');
                                                                                                                                                                                                                                            img.src = C.logoImage;
                                                                                                                                                                                                                                                img.className = 'welcome-logo';
                                                                                                                                                                                                                                                    img.onerror = () => { img.style.display='none'; };
                                                                                                                                                                                                                                                        logoWrap.appendChild(img);
                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                            // Construir slots de miniaturas
                                                                                                                                                                                                                                                              buildThumbs();

                                                                                                                                                                                                                                                                // Precargar camara en background para respuesta mas rapida
                                                                                                                                                                                                                                                                  preloadCamera();
                                                                                                                                                                                                                                                                  });

                                                                                                                                                                                                                                                                  function buildThumbs() {
                                                                                                                                                                                                                                                                    const container = document.getElementById('photoThumbs');
                                                                                                                                                                                                                                                                      container.innerHTML = '';
                                                                                                                                                                                                                                                                        for (let i = 0; i < C.totalPhotos; i++) {
                                                                                                                                                                                                                                                                            const slot = document.createElement('div');
                                                                                                                                                                                                                                                                                slot.className = 'thumb-slot';
                                                                                                                                                                                                                                                                                    slot.id = 'thumb-' + i;
                                                                                                                                                                                                                                                                                        container.appendChild(slot);
                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                          // ===== CAMARA =====
                                                                                                                                                                                                                                                                                          async function preloadCamera() {
                                                                                                                                                                                                                                                                                            try {
                                                                                                                                                                                                                                                                                                stream = await navigator.mediaDevices.getUserMedia({
                                                                                                                                                                                                                                                                                                      video: { facingMode: C.cameraFacing, width: { ideal: 1280 }, height: { ideal: 960 } },
                                                                                                                                                                                                                                                                                                            audio: false
                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                    const video = document.getElementById('cameraVideo');
                                                                                                                                                                                                                                                                                                                        video.srcObject = stream;
                                                                                                                                                                                                                                                                                                                            if (C.mirrorCamera) video.classList.add('cameraVideoMirror');
                                                                                                                                                                                                                                                                                                                                video.id = C.mirrorCamera ? 'cameraVideo cameraVideoMirror' : 'cameraVideo';
                                                                                                                                                                                                                                                                                                                                    if (C.mirrorCamera) video.style.transform = 'scaleX(-1)';
                                                                                                                                                                                                                                                                                                                                      } catch (e) {
                                                                                                                                                                                                                                                                                                                                          console.warn('Camara no disponible aun:', e.message);
                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                            async function ensureCamera() {
                                                                                                                                                                                                                                                                                                                                              if (stream && stream.active) return;
                                                                                                                                                                                                                                                                                                                                                await preloadCamera();
                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                // ===== SESION =====
                                                                                                                                                                                                                                                                                                                                                async function startSession() {
                                                                                                                                                                                                                                                                                                                                                  photos = [];
                                                                                                                                                                                                                                                                                                                                                    buildThumbs();
                                                                                                                                                                                                                                                                                                                                                      await ensureCamera();
                                                                                                                                                                                                                                                                                                                                                        showScreen('screenCamera');
                                                                                                                                                                                                                                                                                                                                                          // Pequeña pausa para que se vea la camara antes de empezar
                                                                                                                                                                                                                                                                                                                                                            await wait(800);
                                                                                                                                                                                                                                                                                                                                                              await runPhotoSequence();
                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                              async function runPhotoSequence() {
                                                                                                                                                                                                                                                                                                                                                                for (let i = 0; i < C.totalPhotos; i++) {
                                                                                                                                                                                                                                                                                                                                                                    updateIndicator(i + 1);
                                                                                                                                                                                                                                                                                                                                                                        await countdown(C.countdownSeconds);
                                                                                                                                                                                                                                                                                                                                                                            await takePhoto(i);
                                                                                                                                                                                                                                                                                                                                                                                if (i < C.totalPhotos - 1) {
                                                                                                                                                                                                                                                                                                                                                                                      await wait(C.delayBetweenPhotos);
                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                              // Todas las fotos tomadas -> procesar
                                                                                                                                                                                                                                                                                                                                                                                                showScreen('screenProcessing');
                                                                                                                                                                                                                                                                                                                                                                                                  await wait(400);
                                                                                                                                                                                                                                                                                                                                                                                                    const stripDataURL = await buildStrip();
                                                                                                                                                                                                                                                                                                                                                                                                      showResult(stripDataURL);
                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                      function updateIndicator(n) {
                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('photoIndicator').textContent =
                                                                                                                                                                                                                                                                                                                                                                                                            'Foto ' + n + ' de ' + C.totalPhotos;
                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                            // ===== CUENTA REGRESIVA =====
                                                                                                                                                                                                                                                                                                                                                                                                            function countdown(seconds) {
                                                                                                                                                                                                                                                                                                                                                                                                              return new Promise(resolve => {
                                                                                                                                                                                                                                                                                                                                                                                                                  const overlay = document.getElementById('countdownOverlay');
                                                                                                                                                                                                                                                                                                                                                                                                                      const numEl = document.getElementById('countdownNumber');
                                                                                                                                                                                                                                                                                                                                                                                                                          const lblEl = document.getElementById('countdownLabel');
                                                                                                                                                                                                                                                                                                                                                                                                                              overlay.style.display = 'flex';
                                                                                                                                                                                                                                                                                                                                                                                                                                  let n = seconds;

                                                                                                                                                                                                                                                                                                                                                                                                                                      // Sonidos de cuenta regresiva
                                                                                                                                                                                                                                                                                                                                                                                                                                          function beep(freq, vol) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        const ac = new (window.AudioContext || window.webkitAudioContext)();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                const o = ac.createOscillator();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const g = ac.createGain();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                o.connect(g); g.connect(ac.destination);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        o.frequency.value = freq; o.type = 'sine';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                g.gain.setValueAtTime(vol, ac.currentTime);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                o.start(ac.currentTime); o.stop(ac.currentTime + 0.28);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      } catch(e) {}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              function tick() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    numEl.textContent = n;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          numEl.style.animation = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                void numEl.offsetWidth;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      numEl.style.animation = 'cd-pop 0.7s cubic-bezier(0.16,1,0.3,1)';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (n > 1) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    numEl.style.color = '#fff';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            beep(440, 0.3);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    lblEl.textContent = 'Prep\u00e1rate...';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            n--;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    setTimeout(tick, 950);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  numEl.style.color = C.welcomeAccent;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          beep(880, 0.5);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  lblEl.textContent = '\u00a1SONR\u00cdE!';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          setTimeout(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    overlay.style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              resolve();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }, 900);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    tick();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      // ===== CAPTURA =====
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      async function takePhoto(index) {
