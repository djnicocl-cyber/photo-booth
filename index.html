                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 await delay(80);playShutter();doFlash();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   const dataUrl=captureFrame();photos[idx]=dataUrl;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     if(slot){slot.classList.remove('cur');const img=slot.querySelector('img');if(img)img.src=dataUrl;}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       const pip=$('pip-'+idx);if(pip)pip.className='photo-pip done';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         await delay(120);cdNum.classList.remove('visible');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           filterStrip.style.opacity='';filterStrip.style.pointerEvents='';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           async function runSequence(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             photos=[];buildSlots();activeFilter='normal';videoWrap.className='';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               filterStrip.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 filterStrip.querySelector('[data-f="normal"]').classList.add('on');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   showScreen('camera');await startCamera();await delay(900);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     for(let i=0;i<CFG.totalPhotos;i++){if(i>0)await delay(CFG.delayBetweenPhotos);await snapOne(i);}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       cdNum.textContent='';await delay(300);stopCamera();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         await delay(50);await buildStrip();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           showScreen('result');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             const dl=$('btn-dl');if(dl)dl.href=resCv.toDataURL('image/jpeg',.95);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               if(CFG.autoPrint)setTimeout(()=>printStrip(),CFG.printDelay);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 startReturn();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 function loadImg(src){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   return new Promise(res=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       if(!src)return res(null);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           const img=new Image();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               img.onload=()=>res(img);img.onerror=()=>res(null);img.src=src;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 async function buildStrip(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   const n=photos.length,PX=CFG.paddingX,PT=CFG.paddingTop,PB=CFG.paddingBottom,GAP=CFG.gapBetweenPhotos;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     const PW=CFG.stripWidth-PX*2,PH=Math.round(PW/CFG.photoAspectRatio),SW=CFG.stripWidth;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       const SH=PT+(PH+GAP)*n-GAP+PB;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         resCv.width=SW;resCv.height=SH;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           const ctx=resCv.getContext('2d');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             ctx.fillStyle=CFG.stripBgColor;ctx.fillRect(0,0,SW,SH);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               if(CFG.stripBgImage){const bg=await loadImg(CFG.stripBgImage);if(bg)ctx.drawImage(bg,0,0,SW,SH);}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 const grad=ctx.createLinearGradient(0,0,0,SH);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   grad.addColorStop(0,'rgba(255,255,255,.04)');grad.addColorStop(1,'rgba(0,0,0,.18)');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     ctx.fillStyle=grad;ctx.fillRect(0,0,SW,SH);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       ctx.fillStyle=CFG.accentColor;ctx.fillRect(0,0,SW,5);ctx.fillRect(0,SH-5,SW,5);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         const logoEl=$('welcome-logo');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           const logoImg=CFG.logoImage?await loadImg(CFG.logoImage):(logoEl&&logoEl.complete&&logoEl.naturalWidth?logoEl:null);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             if(logoImg&&logoImg.naturalWidth){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 const lh=CFG.logoHeight,lw=logoImg.naturalWidth*(lh/logoImg.naturalHeight);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     ctx.drawImage(logoImg,(SW-lw)/2,Math.max((PT-lh)/2,6),lw,lh);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         for(let i=0;i<photos.length;i++){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             const img=await loadImg(photos[i]);if(!img)continue;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 const x=PX,y=PT+i*(PH+GAP),r=10;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     ctx.save();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=14;ctx.shadowOffsetY=4;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             roundRect(ctx,x,y,PW,PH,r);ctx.clip();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 ctx.shadowColor='transparent';ctx.drawImage(img,x,y,PW,PH);ctx.restore();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     ctx.save();roundRect(ctx,x,y,PW,PH,r);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             const sepY=PT+(PH+GAP)*n-GAP+10;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               ctx.fillStyle=CFG.accentColor;ctx.globalAlpha=.6;ctx.fillRect(PX,sepY,SW-PX*2,1.5);ctx.globalAlpha=1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 const baseY=sepY+18;ctx.textAlign='center';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   if(CFG.eventName){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       ctx.font='bold 22px "Arial Black",Arial,sans-serif';ctx.fillStyle=CFG.textColor;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=8;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               ctx.fillText(CFG.eventName,SW/2,baseY+20);ctx.shadowBlur=0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   const sub=[CFG.eventSubtitle,CFG.hashtag,CFG.eventDate].filter(Boolean).join('  \u00b7  ');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     if(sub){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         ctx.font='bold 13px Arial,sans-serif';ctx.fillStyle=CFG.subtitleColor;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             ctx.globalAlpha=.9;ctx.fillText(sub,SW/2,baseY+40);ctx.globalAlpha=1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 if(CFG.overlayImage){const ov=await loadImg(CFG.overlayImage);if(ov)ctx.drawImage(ov,0,0,SW,SH);}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 function roundRect(ctx,x,y,w,h,r){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       function printStrip(){
