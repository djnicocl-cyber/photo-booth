<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Photo Booth</title>
<style>
:root{--accent:#ff66cc;--bg:#0d0d1a;--font:'Segoe UI',Arial,sans-serif;--font-bold:'Arial Black',Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--font);overflow:hidden;color:#fff;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .45s cubic-bezier(.4,0,.2,1),transform .45s;will-change:opacity,transform}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97)}
#screen-welcome{background:radial-gradient(ellipse at 50% 30%,color-mix(in srgb,var(--accent) 18%,var(--bg)),var(--bg) 70%)}
.welcome-glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--accent) 22%,transparent),transparent 70%);pointer-events:none;animation:pulse-glow 4s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
#welcome-logo{max-width:280px;max-height:140px;object-fit:contain;margin-bottom:28px;filter:drop-shadow(0 0 20px var(--accent));display:none}
#welcome-logo.show{display:block}
#welcome-title{font-family:var(--font-bold);font-size:clamp(2.8rem,9vw,5.5rem);font-weight:900;text-align:center;line-height:1;margin-bottom:14px;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px var(--accent))}
#welcome-subtitle{font-size:clamp(.95rem,2.5vw,1.35rem);text-align:center;opacity:.75;margin-bottom:52px}
#btn-start{position:relative;padding:22px 64px;font-size:clamp(1.1rem,3vw,1.6rem);font-family:var(--font-bold);font-weight:900;background:var(--accent);color:#000;border:none;border-radius:60px;cursor:pointer;letter-spacing:2px;box-shadow:0 0 50px color-mix(in srgb,var(--accent) 60%,transparent),0 4px 20px rgba(0,0,0,.5);transition:transform .15s,box-shadow .15s}
#btn-start:after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.3),transparent 60%);border-radius:inherit}
#btn-start:active{transform:scale(.94)}
#btn-start:hover{transform:scale(1.04)}
#event-badge{margin-top:32px;padding:8px 20px;border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:30px;font-size:.85rem;letter-spacing:1.5px;opacity:.7;text-transform:uppercase;color:var(--accent)}
#screen-camera{background:#000;padding:0}
#video-wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}
#video{width:100%;height:100%;object-fit:cover;transition:filter .3s}
#video.mirror{transform:scaleX(-1)}
#video-wrap.f-bw #video{filter:grayscale(1) contrast(1.1)}
#video-wrap.f-sepia #video{filter:sepia(.9) contrast(1.05)}
#video-wrap.f-vivid #video{filter:saturate(2.2) contrast(1.2) brightness(1.05)}
#video-wrap.f-cool #video{filter:hue-rotate(35deg) saturate(1.4) brightness(.95)}
#video-wrap.f-warm #video{filter:hue-rotate(-25deg) saturate(1.5) brightness(1.08)}
#video-wrap.f-drama #video{filter:contrast(1.6) brightness(.85) saturate(.8)}
#video-wrap.f-neon #video{filter:saturate(3) hue-rotate(15deg) contrast(1.3) brightness(.9)}
#cam-hud{position:absolute;top:0;left:0;right:0;padding:18px 20px 12px;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);z-index:10}
.photo-pip{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.45);background:transparent;transition:all .3s}
.photo-pip.done{background:#fff;border-color:#fff}
.photo-pip.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px var(--accent);transform:scale(1.3)}
#cd-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:20}
#cd-num{font-family:var(--font-bold);font-size:clamp(7rem,22vw,16rem);font-weight:900;color:#fff;text-shadow:0 0 80px var(--accent),0 6px 16px rgba(0,0,0,.9);opacity:0;transform:scale(1.5) translateY(10px);transition:opacity .2s,transform .2s;line-height:1}
#cd-num.visible{opacity:1;transform:scale(1) translateY(0)}
.cg{position:absolute;width:36px;height:36px;opacity:.45;pointer-events:none;z-index:5}
.cg:before,.cg:after{content:'';position:absolute;background:var(--accent);border-radius:2px}
.cg:before{width:100%;height:3px}
.cg:after{width:3px;height:100%}
#cg-tl{top:16px;left:16px}
#cg-tr{top:16px;right:16px;transform:scaleX(-1)}
#cg-bl{bottom:16px;left:16px;transform:scaleY(-1)}
#cg-br{bottom:16px;right:16px;transform:scale(-1)}
#filter-strip{position:absolute;bottom:80px;left:0;right:0;display:flex;justify-content:center;gap:8px;padding:0 12px;z-index:10;overflow-x:auto;scrollbar-width:none}
#filter-strip::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;width:52px;height:52px;border-radius:50%;border:2.5px solid rgba(255,255,255,.2);cursor:pointer;font-size:.58rem;font-weight:800;color:#fff;text-shadow:0 1px 3px #000;display:flex;align-items:center;justify-content:center;transition:border-color .2s,transform .15s,box-shadow .2s}
.fb.on{border-color:#fff;transform:scale(1.18);box-shadow:0 0 14px rgba(255,255,255,.5)}
.fb[data-f=normal]{background:linear-gradient(135deg,#555,#aaa)}
.fb[data-f=bw]{background:linear-gradient(135deg,#222,#eee)}
.fb[data-f=sepia]{background:linear-gradient(135deg,#8b6335,#d4a74a)}
.fb[data-f=vivid]{background:linear-gradient(135deg,#e32,#4bf)}
.fb[data-f=cool]{background:linear-gradient(135deg,#26f,#0ef)}
.fb[data-f=warm]{background:linear-gradient(135deg,#f90,#f30)}
.fb[data-f=drama]{background:linear-gradient(135deg,#111,#444)}
.fb[data-f=neon]{background:linear-gradient(135deg,#f0f,#0ff)}
#thumb-row{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.tslot{width:58px;height:44px;border-radius:7px;border:2px solid rgba(255,255,255,.18);background:rgba(0,0,0,.4);overflow:hidden;transition:border-color .3s,box-shadow .3s}
.tslot.cur{border-color:var(--accent);box-shadow:0 0 12px color-mix(in srgb,var(--accent) 70%,transparent)}
.tslot img{width:100%;height:100%;object-fit:cover;display:block}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:999;transition:opacity .06s ease}
#screen-result{background:radial-gradient(ellipse at 50% 80%,color-mix(in srgb,var(--accent) 12%,var(--bg)),var(--bg) 65%);padding:20px 16px;gap:16px}
#result-heading{font-size:.8rem;letter-spacing:4px;text-transform:uppercase;opacity:.55}
#result-canvas-box{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;width:100%;overflow:hidden}
#result-canvas{max-height:100%;max-width:min(360px,88vw);border-radius:10px;box-shadow:0 8px 60px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06);animation:pop-in .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop-in{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
#result-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;width:100%}
.rbtn{padding:14px 30px;border-radius:40px;font-family:var(--font-bold);font-size:.95rem;font-weight:900;letter-spacing:1.5px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.rbtn:active{transform:scale(.94)}
.rbtn.primary{background:var(--accent);color:#000;box-shadow:0 0 35px color-mix(in srgb,var(--accent) 55%,transparent)}
.rbtn.primary:hover{box-shadow:0 0 55px var(--accent);transform:scale(1.04)}
.rbtn.outline{background:transparent;color:var(--accent);border:2px solid var(--accent)}
.rbtn.ghost{background:rgba(255,255,255,.07);color:#fff;border:1.5px solid rgba(255,255,255,.18)}
#share-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.sc{padding:9px 18px;border-radius:30px;font-size:.8rem;font-weight:700;border:none;cursor:pointer;transition:transform .15s,filter .15s;display:inline-flex;align-items:center;gap:6px}
.sc:hover{filter:brightness(1.15);transform:scale(1.05)}
.sc:active{transform:scale(.93)}
.sc-wa{background:#25d366;color:#fff}
.sc-ig{background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);color:#fff}
.sc-cp{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
#ret-bar{width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
#ret-fill{height:100%;background:var(--accent);width:100%;transform-origin:left}
#cap-cv{display:none}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(20,18,40,.92);border:1px solid rgba(255,255,255,.15);color:#fff;padding:12px 24px;border-radius:30px;font-size:.9rem;white-space:nowrap;z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(10px)}
#toast.show{opacity:1}
#loading{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:500;opacity:0;pointer-events:none;transition:opacity .3s}
#loading.show{opacity:1;pointer-events:all}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{opacity:.7;font-size:.9rem;letter-spacing:2px}
#cfg-toggle{position:fixed;top:14px;right:14px;width:36px;height:36px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;font-size:1.1rem;transition:background .2s;color:#fff}
#cfg-toggle:hover{background:rgba(255,255,255,.18)}
#cfg-panel{position:fixed;top:0;right:0;bottom:0;width:min(340px,94vw);background:rgba(10,8,28,.97);border-left:1px solid rgba(255,255,255,.1);padding:24px 20px;overflow-y:auto;z-index:300;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(20px)}
#cfg-panel.open{transform:translateX(0)}
#cfg-panel h2{font-size:1rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;color:var(--accent)}
.cf{margin-bottom:14px}
.cf label{display:block;font-size:.78rem;letter-spacing:1px;opacity:.6;margin-bottom:5px;text-transform:uppercase}
.cf input,.cf select{width:100%;padding:9px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:.88rem;outline:none;transition:border-color .2s}
.cf input:focus,.cf select:focus{border-color:var(--accent)}
.cf input[type=color]{padding:3px 6px;height:38px;cursor:pointer}
.cf input[type=range]{padding:0;background:transparent;border:none;cursor:pointer}
.csep{height:1px;background:rgba(255,255,255,.08);margin:18px 0}
#cfg-apply{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:10px;font-weight:900;font-size:.95rem;cursor:pointer;letter-spacing:2px;margin-top:8px;transition:filter .2s;font-family:var(--font-bold)}
#cfg-apply:hover{filter:brightness(1.1)}
#cfg-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;opacity:.6;transition:opacity .2s}
#cfg-close:hover{opacity:1}
@media(max-width:480px){.fb{width:44px;height:44px;font-size:.5rem}.rbtn{padding:12px 22px;font-size:.85rem}}
</style>
</head>
<body>
  <button id="cfg-toggle" title="Configurar">&#9881;&#65039;</button>

  <div id="screen-welcome" class="screen">
    <div class="welcome-glow"></div>
      <img id="welcome-logo" src="" alt="Logo">
        <div id="welcome-title">Photo Booth</div>
          <div id="welcome-subtitle">Presiona el bot&oacute;n y sonr&iacute;e!</div>
            <button id="btn-start">&#128247; INICIAR</button>
              <div id="event-badge"></div>
              </div>

              <div id="screen-camera" class="screen hidden">
                <div id="video-wrap">
                    <video id="video" autoplay playsinline muted></video>
                        <div class="cg" id="cg-tl"></div>
                            <div class="cg" id="cg-tr"></div>
                                <div class="cg" id="cg-bl"></div>
                                    <div class="cg" id="cg-br"></div>
                                        <div id="cam-hud"></div>
                                            <div id="cd-overlay"><div id="cd-num"></div></div>
                                                <div id="filter-strip">
                                                      <button class="fb on" data-f="normal">NORM</button>
                                                            <button class="fb" data-f="bw">B&amp;W</button>
                                                                  <button class="fb" data-f="sepia">SEPIA</button>
                                                                        <button class="fb" data-f="vivid">VIVO</button>
                                                                              <button class="fb" data-f="cool">COOL</button>
                                                                                    <button class="fb" data-f="warm">WARM</button>
                                                                                          <button class="fb" data-f="drama">DRAMA</button>
                                                                                                <button class="fb" data-f="neon">NEON</button>
                                                                                                    </div>
                                                                                                        <div id="thumb-row"></div>
                                                                                                          </div>
                                                                                                          </div>

                                                                                                          <div id="screen-result" class="screen hidden">
                                                                                                            <div id="result-heading">&#10024; TU PHOTO STRIP &#10024;</div>
                                                                                                              <div id="result-canvas-box"><canvas id="result-canvas"></canvas></div>
                                                                                                                <div id="result-btns">
                                                                                                                    <button id="btn-print" class="rbtn primary">&#128438; IMPRIMIR</button>
                                                                                                                        <a id="btn-dl" class="rbtn outline" download="photo-strip.jpg">&#11015;&#65039; DESCARGAR</a>
                                                                                                                            <button id="btn-new" class="rbtn ghost">&#8635; NUEVA</button>
                                                                                                                              </div>
                                                                                                                                <div id="share-row">
                                                                                                                                    <button class="sc sc-wa" id="sc-wa">WhatsApp</button>
                                                                                                                                        <button class="sc sc-ig" id="sc-ig">Instagram</button>
                                                                                                                                            <button class="sc sc-cp" id="sc-cp">&#128203; Copiar</button>
                                                                                                                                              </div>
                                                                                                                                                <div id="ret-bar"><div id="ret-fill"></div></div>
                                                                                                                                                </div>

                                                                                                                                                <div id="flash"></div>
                                                                                                                                                <div id="toast"></div>
                                                                                                                                                <div id="loading"><div class="spinner"></div><p>CARGANDO C&Aacute;MARA&hellip;</p></div>
                                                                                                                                                <canvas id="cap-cv"></canvas>

                                                                                                                                                <div id="cfg-panel">
                                                                                                                                                  <button id="cfg-close">&#10005;</button>
                                                                                                                                                    <h2>&#9881; Configuraci&oacute;n</h2>
                                                                                                                                                      <div class="cf"><label>Nombre del evento</label><input id="ci-name" type="text"></div>
                                                                                                                                                        <div class="cf"><label>Subt&iacute;tulo</label><input id="ci-sub" type="text"></div>
                                                                                                                                                          <div class="cf"><label>Hashtag</label><input id="ci-hash" type="text"></div>
                                                                                                                                                            <div class="cf"><label>A&ntilde;o / Fecha</label><input id="ci-date" type="text"></div>
                                                                                                                                                              <div class="csep"></div>
                                                                                                                                                                <div class="cf"><label>Fotos por sesi&oacute;n (1-6)</label><input id="ci-total" type="range" min="1" max="6" step="1"></div>
                                                                                                                                                                  <div class="cf"><label>Cuenta regresiva (seg)</label><input id="ci-cd" type="range" min="1" max="10" step="1"></div>
                                                                                                                                                                    <div class="cf"><label>C&aacute;mara</label><select id="ci-facing"><option value="user">Frontal (selfie)</option><option value="environment">Trasera</option></select></div>
                                                                                                                                                                      <div class="csep"></div>
                                                                                                                                                                        <div class="cf"><label>Color acento</label><input id="ci-accent" type="color"></div>
                                                                                                                                                                          <div class="cf"><label>Color fondo tira</label><input id="ci-bgcol" type="color"></div>
                                                                                                                                                                            <div class="cf"><label>Color fondo pantalla</label><input id="ci-wbg" type="color"></div>
                                                                                                                                                                              <div class="cf"><label>Color texto tira</label><input id="ci-tcol" type="color"></div>
                                                                                                                                                                                <div class="csep"></div>
                                                                                                                                                                                  <div class="cf"><label>Proporci&oacute;n foto</label><select id="ci-ratio"><option value="1.333">4:3 (cl&aacute;sico)</option><option value="1.778">16:9 (panor&aacute;mico)</option><option value="0.75">3:4 (retrato)</option><option value="1">1:1 (cuadrado)</option></select></div>
                                                                                                                                                                                    <div class="cf"><label>Espejo de c&aacute;mara</label><select id="ci-mirror"><option value="1">S&iacute; (selfie)</option><option value="0">No</option></select></div>
                                                                                                                                                                                      <div class="csep"></div>
                                                                                                                                                                                        <button id="cfg-apply">APLICAR CAMBIOS</button>
                                                                                                                                                                                        </div>

                                                                                                                                                                                        <script>
                                                                                                                                                                                        // ══════════════════════════════════════════════════════
                                                                                                                                                                                        //  PHOTO BOOTH v2.0 — self-contained, no dependencies
                                                                                                                                                                                        // ══════════════════════════════════════════════════════
                                                                                                                                                                                        const DEFAULTS = {
                                                                                                                                                                                          eventName:'Party Cam',eventSubtitle:'Escanea y aparece en pantalla',eventDate:'2026',hashtag:'#PartyCam',
                                                                                                                                                                                            totalPhotos:3,countdownSeconds:5,delayBetweenPhotos:1500,mirrorCamera:true,cameraFacing:'user',
                                                                                                                                                                                              stripWidth:600,photoAspectRatio:4/3,stripBgColor:'#1a0033',stripBgImage:'',overlayImage:'',
                                                                                                                                                                                                logoImage:'',logoHeight:120,textColor:'#ffffff',subtitleColor:'#ff66cc',accentColor:'#ff66cc',
                                                                                                                                                                                                  paddingTop:50,paddingBottom:48,paddingX:24,gapBetweenPhotos:14,
                                                                                                                                                                                                    welcomeTitle:'Photo Booth',welcomeSubtitle:'Presiona el bot\u00f3n y sonr\u00ede!',
                                                                                                                                                                                                      welcomeBgColor:'#0d0d1a',welcomeAccent:'#ff66cc',
                                                                                                                                                                                                        autoPrint:false,printDelay:2000,returnDelay:15000,flashColor:'#ffffff',flashDuration:130,
                                                                                                                                                                                                        };
                                                                                                                                                                                                        const C_EXT = (typeof BOOTH_CONFIG !== 'undefined') ? BOOTH_CONFIG : {};
                                                                                                                                                                                                        let CFG = {...DEFAULTS,...C_EXT};

                                                                                                                                                                                                        function loadSaved(){try{const s=localStorage.getItem('pb_cfg');if(s)CFG={...CFG,...JSON.parse(s)};}catch(e){}}
                                                                                                                                                                                                        function saveCfg(p){CFG={...CFG,...p};try{localStorage.setItem('pb_cfg',JSON.stringify(p));}catch(e){}applyVis();}
                                                                                                                                                                                                        loadSaved();

                                                                                                                                                                                                        const $=id=>document.getElementById(id);
                                                                                                                                                                                                        const video=$('video'),capCv=$('cap-cv'),resCv=$('result-canvas'),flashEl=$('flash');
                                                                                                                                                                                                        const retFill=$('ret-fill'),thumbRow=$('thumb-row'),camHud=$('cam-hud');
                                                                                                                                                                                                        const cdNum=$('cd-num'),videoWrap=$('video-wrap'),filterStrip=$('filter-strip');
                                                                                                                                                                                                        const loadingEl=$('loading'),toastEl=$('toast');

                                                                                                                                                                                                        let photos=[],activeFilter='normal',retTimer=null,mediaStream=null,toastTimer=null;

                                                                                                                                                                                                        function applyVis(){
                                                                                                                                                                                                          const r=document.documentElement;
                                                                                                                                                                                                            r.style.setProperty('--accent',CFG.welcomeAccent||CFG.accentColor);
                                                                                                                                                                                                              r.style.setProperty('--bg',CFG.welcomeBgColor);
                                                                                                                                                                                                                $('welcome-title').textContent=CFG.welcomeTitle;
                                                                                                                                                                                                                  $('welcome-subtitle').textContent=CFG.welcomeSubtitle;
                                                                                                                                                                                                                    const badge=$('event-badge');
                                                                                                                                                                                                                      const parts=[CFG.eventName,CFG.hashtag,CFG.eventDate].filter(Boolean);
                                                                                                                                                                                                                        badge.textContent=parts.join('  \u00b7  ');
                                                                                                                                                                                                                          badge.style.display=parts.length?'block':'none';
                                                                                                                                                                                                                            const logo=$('welcome-logo');
                                                                                                                                                                                                                              if(CFG.logoImage){logo.src=CFG.logoImage;logo.classList.add('show');}
                                                                                                                                                                                                                                else logo.classList.remove('show');
                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                applyVis();

                                                                                                                                                                                                                                function showScreen(name){
                                                                                                                                                                                                                                  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
                                                                                                                                                                                                                                    const el=document.getElementById('screen-'+name);
                                                                                                                                                                                                                                      if(el)requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.remove('hidden')));
                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                      function toast(msg,ms=2400){
                                                                                                                                                                                                                                        clearTimeout(toastTimer);
                                                                                                                                                                                                                                          toastEl.textContent=msg;
                                                                                                                                                                                                                                            toastEl.classList.add('show');
                                                                                                                                                                                                                                              toastTimer=setTimeout(()=>toastEl.classList.remove('show'),ms);
                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                              function beep(f=880,d=90,v=.28){
                                                                                                                                                                                                                                                try{
                                                                                                                                                                                                                                                    const ac=new(window.AudioContext||window.webkitAudioContext)();
                                                                                                                                                                                                                                                        const o=ac.createOscillator(),g=ac.createGain();
                                                                                                                                                                                                                                                            o.connect(g);g.connect(ac.destination);
                                                                                                                                                                                                                                                                o.frequency.value=f;
                                                                                                                                                                                                                                                                    g.gain.setValueAtTime(v,ac.currentTime);
                                                                                                                                                                                                                                                                        g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d/1000);
                                                                                                                                                                                                                                                                            o.start();o.stop(ac.currentTime+d/1000);
                                                                                                                                                                                                                                                                              }catch(e){}
                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                              function playShutter(){
                                                                                                                                                                                                                                                                                try{
                                                                                                                                                                                                                                                                                    const ac=new(window.AudioContext||window.webkitAudioContext)();
                                                                                                                                                                                                                                                                                        const buf=ac.createBuffer(1,ac.sampleRate*.04,ac.sampleRate);
                                                                                                                                                                                                                                                                                            const data=buf.getChannelData(0);
                                                                                                                                                                                                                                                                                                for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/(data.length*.15));
                                                                                                                                                                                                                                                                                                    const src=ac.createBufferSource();
                                                                                                                                                                                                                                                                                                        src.buffer=buf;
                                                                                                                                                                                                                                                                                                            const g=ac.createGain();g.gain.value=.7;
                                                                                                                                                                                                                                                                                                                src.connect(g);g.connect(ac.destination);src.start();
                                                                                                                                                                                                                                                                                                                  }catch(e){}
                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                  function doFlash(){
                                                                                                                                                                                                                                                                                                                    flashEl.style.background=CFG.flashColor;
                                                                                                                                                                                                                                                                                                                      flashEl.style.opacity='1';
                                                                                                                                                                                                                                                                                                                        setTimeout(()=>{flashEl.style.opacity='0';},CFG.flashDuration);
                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                        function buildSlots(){
                                                                                                                                                                                                                                                                                                                          thumbRow.innerHTML=camHud.innerHTML='';
                                                                                                                                                                                                                                                                                                                            for(let i=0;i<CFG.totalPhotos;i++){
                                                                                                                                                                                                                                                                                                                                const pip=document.createElement('div');
                                                                                                                                                                                                                                                                                                                                    pip.className='photo-pip';pip.id='pip-'+i;camHud.appendChild(pip);
                                                                                                                                                                                                                                                                                                                                        const sl=document.createElement('div');
                                                                                                                                                                                                                                                                                                                                            sl.className='tslot';sl.id='ts-'+i;
                                                                                                                                                                                                                                                                                                                                                const img=document.createElement('img');sl.appendChild(img);thumbRow.appendChild(sl);
                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                  function updatePips(cur){
                                                                                                                                                                                                                                                                                                                                                    for(let i=0;i<CFG.totalPhotos;i++){
                                                                                                                                                                                                                                                                                                                                                        const p=$('pip-'+i);if(!p)continue;
                                                                                                                                                                                                                                                                                                                                                            p.className='photo-pip'+(i<cur?' done':i===cur?' active':'');
                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                              async function startCamera(){
                                                                                                                                                                                                                                                                                                                                                                loadingEl.classList.add('show');
                                                                                                                                                                                                                                                                                                                                                                  const ratio=CFG.photoAspectRatio,portrait=ratio<1;
                                                                                                                                                                                                                                                                                                                                                                    try{
                                                                                                                                                                                                                                                                                                                                                                        mediaStream=await navigator.mediaDevices.getUserMedia({
                                                                                                                                                                                                                                                                                                                                                                              video:{facingMode:CFG.cameraFacing,aspectRatio:{ideal:ratio},
                                                                                                                                                                                                                                                                                                                                                                                           width:{ideal:portrait?720:1280},height:{ideal:portrait?1280:720},frameRate:{ideal:30}},
                                                                                                                                                                                                                                                                                                                                                                                                 audio:false,
                                                                                                                                                                                                                                                                                                                                                                                                     });
                                                                                                                                                                                                                                                                                                                                                                                                         video.srcObject=mediaStream;
                                                                                                                                                                                                                                                                                                                                                                                                             await video.play();
                                                                                                                                                                                                                                                                                                                                                                                                                 video.classList.toggle('mirror',!!CFG.mirrorCamera);
                                                                                                                                                                                                                                                                                                                                                                                                                     loadingEl.classList.remove('show');
                                                                                                                                                                                                                                                                                                                                                                                                                       }catch(err){
                                                                                                                                                                                                                                                                                                                                                                                                                           loadingEl.classList.remove('show');
                                                                                                                                                                                                                                                                                                                                                                                                                               toast('\u274c No se pudo acceder a la c\u00e1mara: '+err.message,5000);
                                                                                                                                                                                                                                                                                                                                                                                                                                   goHome();
                                                                                                                                                                                                                                                                                                                                                                                                                                     }
                                                                                                                                                                                                                                                                                                                                                                                                                                     }

                                                                                                                                                                                                                                                                                                                                                                                                                                     function stopCamera(){
                                                                                                                                                                                                                                                                                                                                                                                                                                       if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null;}
                                                                                                                                                                                                                                                                                                                                                                                                                                         video.srcObject=null;
                                                                                                                                                                                                                                                                                                                                                                                                                                         }

                                                                                                                                                                                                                                                                                                                                                                                                                                         const FMAP={normal:'none',bw:'grayscale(1) contrast(1.1)',sepia:'sepia(.9) contrast(1.05)',
                                                                                                                                                                                                                                                                                                                                                                                                                                           vivid:'saturate(2.2) contrast(1.2) brightness(1.05)',cool:'hue-rotate(35deg) saturate(1.4) brightness(.95)',
                                                                                                                                                                                                                                                                                                                                                                                                                                             warm:'hue-rotate(-25deg) saturate(1.5) brightness(1.08)',drama:'contrast(1.6) brightness(.85) saturate(.8)',
                                                                                                                                                                                                                                                                                                                                                                                                                                               neon:'saturate(3) hue-rotate(15deg) contrast(1.3) brightness(.9)'};

                                                                                                                                                                                                                                                                                                                                                                                                                                               filterStrip.addEventListener('click',e=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                 const btn=e.target.closest('.fb');if(!btn)return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                   activeFilter=btn.dataset.f;
                                                                                                                                                                                                                                                                                                                                                                                                                                                     filterStrip.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
                                                                                                                                                                                                                                                                                                                                                                                                                                                       btn.classList.add('on');
                                                                                                                                                                                                                                                                                                                                                                                                                                                         videoWrap.className=activeFilter==='normal'?'':'f-'+activeFilter;
                                                                                                                                                                                                                                                                                                                                                                                                                                                         });

                                                                                                                                                                                                                                                                                                                                                                                                                                                         function captureFrame(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                           const ratio=CFG.photoAspectRatio,pw=CFG.stripWidth-CFG.paddingX*2,ph=Math.round(pw/ratio);
                                                                                                                                                                                                                                                                                                                                                                                                                                                             capCv.width=pw;capCv.height=ph;
                                                                                                                                                                                                                                                                                                                                                                                                                                                               const ctx=capCv.getContext('2d');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                 const vw=video.videoWidth||video.clientWidth,vh=video.videoHeight||video.clientHeight;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                   let sx,sy,sw,sh;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                     if(vw/vh>ratio){sh=vh;sw=vh*ratio;sx=(vw-sw)/2;sy=0;}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                       else{sw=vw;sh=vw/ratio;sx=0;sy=(vh-sh)/2;}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                         if(CFG.mirrorCamera){ctx.save();ctx.translate(pw,0);ctx.scale(-1,1);}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                           ctx.filter=FMAP[activeFilter]||'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                             ctx.drawImage(video,sx,sy,sw,sh,0,0,pw,ph);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                               if(CFG.mirrorCamera)ctx.restore();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 ctx.filter='none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   return capCv.toDataURL('image/jpeg',.93);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   const delay=ms=>new Promise(r=>setTimeout(r,ms));

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   async function snapOne(idx){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     const slot=$('ts-'+idx);if(slot)slot.classList.add('cur');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       updatePips(idx);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         filterStrip.style.opacity='.25';filterStrip.style.pointerEvents='none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           for(let s=CFG.countdownSeconds;s>=1;s--){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               cdNum.textContent=s;cdNum.classList.remove('visible');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   void cdNum.offsetWidth;cdNum.classList.add('visible');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       beep(s===1?1320:660,100,s===1?.4:.25);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           await delay(700);cdNum.classList.remove('visible');await delay(250);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               cdNum.textContent='\ud83d\udcf8';cdNum.classList.add('visible');
